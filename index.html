<!DOCTYPE html>
<html>
<head>
  <title>Sanzeet Photography</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    img { width:150px; margin:10px; border-radius:10px; }
  </style>
</head>

<body>

<h2>📸 Sanzeet Photography</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<hr>

<h3>Upload Photo</h3>
<input type="file" id="file">
<button onclick="upload()">Upload</button>

<h3>Gallery</h3>
<div id="gallery"></div>

<p id="status"></p>

<script>
  // 🔥 Firebase Config (YAHAN APNA PASTE KARNA)
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBmNYT07wtBxRdMmVgubRWUPEY3H6DQ608",
  authDomain: "sanzeet-photography.firebaseapp.com",
  projectId: "sanzeet-photography",
  storageBucket: "sanzeet-photography.firebasestorage.app",
  messagingSenderId: "307593623383",
  appId: "1:307593623383:web:ebc7de8415ce57703cf012",
  measurementId: "G-DHQVQF0D6Y"
};

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const storage = firebase.storage();

  let currentUser = null;

  auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
      status.innerText = "Logged in: " + user.email;
      loadImages();
    }
  });

  function signup() {
    auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
  }

  function login() {
    auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
  }

  function logout() {
    auth.signOut();
    gallery.innerHTML = "";
  }

  function upload() {
    if (!currentUser) return alert("Login first!");

    let file = document.getElementById("file").files[0];
    let ref = storage.ref("photos/" + Date.now() + "_" + file.name);

    ref.put(file).then(() => {
      status.innerText = "Uploaded!";
      loadImages();
    });
  }

  function loadImages() {
    gallery.innerHTML = "";

    storage.ref("photos/").listAll().then(res => {
      res.items.forEach(item => {
        item.getDownloadURL().then(url => {
          let img = document.createElement("img");
          img.src = url;
          gallery.appendChild(img);
        });
      });
    });
  }
</script>

</body>
</html>
