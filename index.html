<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore with Sanzeet | Travel & Nature</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #fdfdfd; color: #333; }
        
        /* Header */
        header { padding: 60px 20px; text-align: center; }
        header h1 { color: #2d5a27; font-size: 2.8rem; letter-spacing: 1px; }
        header p { color: #666; margin-top: 10px; font-style: italic; }

        /* Gallery Grid */
        .grid { 
            max-width: 1000px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; 
        }

        /* Card Style */
        .card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        .date { color: #888; font-size: 0.85rem; text-transform: uppercase; }
        .location { margin: 8px 0; font-size: 1.3rem; font-weight: 600; color: #222; }
    </style>
</head>
<body>

    <header>
        <h1>Explore with Sanzeet</h1>
        <p>Capturing the beauty of nature, one journey at a time.</p>
    </header>

    <div class="grid">
        <!-- Nayi photo add karne ke liye bas niche wala block copy-paste karein -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature">
            <div class="info">
                <p class="date">May 15, 2026</p>
                <h3 class="location">Himalayan Peaks</h3>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05" alt="Forest">
            <div class="info">
                <p class="date">June 2, 2026</p>
                <h3 class="location">Deep Green Valley</h3>
            </div>
        </div>
    </div>
<div class="card">
            <img src="https://i.postimg.cc/5tP4yRpW/20260228-212122.jpg" alt="My Trip">
            <div class="info">
                <p class="date">June 4, 2026</p>
                <h3 class="location">puri</h3>
            </div>
        </div>
</body>
</html>
