<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Explore with Sanzeet</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Gallery Dropdown & Layout CSS -->
    <style>
        .gallery-container { padding: 120px 5% 50px 5%; min-height: 100vh;}
        .gallery-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px;}
        
        /* Search Box */
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 5px 15px; display: flex; align-items: center;}
        .search-box input { background: transparent; border: none; color: white; padding: 8px; outline: none; width: 250px;}
        
        /* Dropdown (Downword Select) */
        .select-menu-container { background: rgba(255,255,255,0.05); padding: 12px 25px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); min-width: 220px; cursor: pointer; position: relative; }
        .select-menu-container h3 { font-size: 0.95rem; font-weight: 600; color: white; text-align: center; font-family: 'Inter', sans-serif;}
        .category-list { display: none; position: absolute; top: 110%; left: 0; width: 100%; background: var(--bg-card); border-radius: 8px; padding: 10px; list-style: none; border: 1px solid rgba(255,255,255,0.1); z-index: 100; max-height: 300px; overflow-y: auto;}
        .category-list.show { display: block; }
        .filter-btn { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; width: 100%; text-align: left; padding: 10px; cursor: pointer; border-radius: 6px; transition: 0.3s;}
        .filter-btn:hover, .filter-btn.active { background: var(--primary-green); color: black;}

        /* Lightbox Fullscreen */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .close-modal { position: absolute; top: 20px; right: 40px; color: white; cursor: pointer; font-size: 3rem; background: none; border: none; transition: 0.3s;}
        .close-modal:hover { color: var(--primary-green); }
    </style>
</head>
<body>

    <!-- Clean Navbar (No Login Buttons) -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-small">EXPLORE WITH</span><br>
            <span class="logo-big">S<span class="highlight">A</span>NZEET</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
        </ul>
        <div class="nav-buttons">
            <!-- Sirf empty jagah taaki layout balance rahe, login hata diya -->
        </div>
    </nav>

    <!-- Gallery Content -->
    <div class="gallery-container">
        <div class="gallery-top">
            
            <!-- Aapka Dropdown Menu (Fixed) -->
            <div class="select-menu-container" id="selectContainer">
                <h3 id="selectHeading">ALL CATEGORIES ▼</h3>
                <ul class="category-list" id="categoryList">
                    <li><button class="filter-btn active" data-filter="all">All Photos</button></li>
                    <li><button class="filter-btn" data-filter="nature">🌿 Nature</button></li>
                    <li><button class="filter-btn" data-filter="birds">🦅 Birds</button></li>
                    <li><button class="filter-btn" data-filter="mountains">⛰️ Mountains</button></li>
                    <li><button class="filter-btn" data-filter="oceans">🌊 Oceans</button></li>
                    <li><button class="filter-btn" data-filter="aesthetic">✨ Aesthetic</button></li>
                </ul>
            </div>

            <!-- Search Box -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search photos...">
                <span>🔍</span>
            </div>
        </div>

        <!-- Master Gallery Grid (Jahan photos aayengi) -->
        <div id="mainGallery" class="collection-grid"></div>
    </div>

    <!-- Lightbox/Loader (Required for JS to view photos) -->
    <div id="loader" class="modal-overlay" style="display:flex;"><h2 style="color:var(--primary-green); font-family:'Inter', sans-serif;">Loading wild life...</h2></div>
    <div id="lightbox" class="modal-overlay">
        <button class="close-modal" id="closeLightbox">&times;</button>
        <img id="lightbox-img" style="max-width:90%; max-height:80vh; border-radius:10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <p id="lightbox-text" style="color:var(--primary-green); margin-top:20px; font-weight:600; letter-spacing:1px; font-size:1.2rem;"></p>
    </div>

    <!-- Firebase & Main JS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
