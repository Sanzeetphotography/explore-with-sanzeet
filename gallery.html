<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Sanzeet Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gallery-body">

    <div id="loader" class="loader"><div class="leaf-spinner">🍃</div><p>Loading Nature...</p></div>
    <div id="lightbox" class="lightbox"><span class="close-btn" id="closeLightbox">&times;</span><img id="lightbox-img" class="lightbox-img" src=""><p id="lightbox-text"></p></div>

    <nav class="navbar">
        <div class="logo">EXPLORE WITH <br><span>SANZEET</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
        </ul>
        <div class="nav-buttons">
            <button class="admin-btn" id="adminLoginBtn">Admin Login</button>
            <button id="uploadBtn" style="display:none;" class="login-btn">➕ Upload Photo</button>
            <input type="file" id="photoUploadInput" accept="image/*" style="display: none;">
        </div>
    </nav>

    <div class="gallery-page-container">
        <div class="gallery-top-bar">
            <div class="select-menu-container" id="selectContainer">
                <h3 id="selectHeading">ALL CATEGORIES ▼</h3>
                <ul class="category-list" id="categoryList">
                    <li><button class="filter-btn active" data-filter="all">All</button></li>
                    <li><button class="filter-btn" data-filter="nature">🌿 Nature</button></li>
                    <li><button class="filter-btn" data-filter="animal">🐅 Animal</button></li>
                    <li><button class="filter-btn" data-filter="birds">🦅 Birds</button></li>
                    <li><button class="filter-btn" data-filter="mountains">🏔️ Mountains</button></li>
                    <li><button class="filter-btn" data-filter="forest">🌲 Forest</button></li>
                    <li><button class="filter-btn" data-filter="historical">🏛️ Historical</button></li>
                    <li><button class="filter-btn" data-filter="earth">🌍 Earth & Env</button></li>
                    <li><button class="filter-btn" data-filter="ocean">🌊 Oceans</button></li>
                    <li><button class="filter-btn" data-filter="aesthetic">✨ Aesthetic</button></li>
                </ul>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search nature, birds...">
                <button>🔍</button>
            </div>
        </div>

        <div class="gallery" id="mainGallery">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script> 
   
    <script src="script.js"></script>
</body>
</html>
